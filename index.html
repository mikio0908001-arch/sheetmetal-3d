<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>板金 図面→概形3D（なぞり）</title>
<style>
  :root { --bar:#1f2733; --accent:#2e7dd1; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; font-family: system-ui,-apple-system,"Segoe UI",sans-serif; }
  body { display:flex; flex-direction:column; background:#eef1f4; }
  header { background:var(--bar); color:#fff; padding:8px 12px; display:flex; gap:8px;
           flex-wrap:wrap; align-items:center; font-size:14px; }
  header b { font-size:15px; margin-right:6px; }
  button { background:#3a4757; color:#fff; border:0; border-radius:6px; padding:7px 11px;
           font-size:13px; cursor:pointer; }
  button:hover { background:#4a5a6e; }
  button.on { background:var(--accent); }
  button.go { background:#2a9d5b; }
  input[type=number]{ width:64px; padding:5px; border-radius:5px; border:1px solid #889; }
  label{ font-size:13px; }
  #status { background:#111a26; color:#cfe3ff; padding:6px 12px; font-size:13px; min-height:18px; }
  main { flex:1; display:flex; min-height:0; }
  .pane { flex:1; min-width:0; position:relative; }
  .pane.left { background:#dfe4ea; border-right:2px solid #c2c9d2; overflow:auto; display:flex;
               align-items:center; justify-content:center; }
  #draw { max-width:100%; max-height:100%; cursor:crosshair; background:#fff; touch-action:none; }
  #three { width:100%; height:100%; display:block; }
  .drop { color:#5a6675; text-align:center; padding:24px; font-size:14px; }
  @media (max-width:820px){ main{ flex-direction:column; } }
</style>
</head>
<body>
<header>
  <b>板金 概形3D</b>
  <input type="file" id="file" accept="image/*,.tif,.tiff,.dxf">
  <button id="mScale">① スケール</button>
  <button id="mOutline">② 輪郭</button>
  <button id="mHoles">③ 穴</button>
  <button id="mBend">④ 曲げ</button>
  <button id="undo">↶ 戻る</button>
  <button id="clear">クリア</button>
  <label>板厚<input type="number" id="thk" value="2.3" step="0.1" min="0.1"> mm</label>
  <button id="gen" class="go">3D生成 ▶</button>
  <button id="export">GLB保存</button>
</header>
<div id="status">図面を読み込んでください（ドラッグ＆ドロップ可）。図面はこの端末内だけで処理され、サーバには送信されません。</div>
<main>
  <div class="pane left" id="leftPane">
    <div class="drop" id="drop">ここに図面（PNG/JPG/TIF/DXF）をドラッグ＆ドロップ<br>または上の「ファイル選択」</div>
    <canvas id="draw" hidden></canvas>
  </div>
  <div class="pane"><canvas id="three"></canvas></div>
</main>

<!-- TIFF をブラウザ内でデコードする軽量ライブラリ（UMDグローバル UTIF を定義）。図面はサーバに送らない。 -->
<script src="https://unpkg.com/utif@3.1.0/UTIF.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { parseDxf } from './src/dxf.js';
import { planFolds } from './src/bend.js';

// ---------- 状態 ----------
let img = null, mode = null;
let scalePts = [], pxPerMm = null;
let outline = [], holes = [], holeDia = 14;
let mesh = null;      // 現在の3Dモデル（平板は Mesh、折り畳み時は Group）
let dxfGeom = null;   // DXF読込時の {outline, holes, units...}（手動トレースとは別管理）
let dxfView = null;   // DXFプレビューの座標変換（クリック→mm 逆変換に使用）
let bends = [], bendPending = null;   // 曲げ線（canvas座標で保持）

const cv = document.getElementById('draw');
const ctx = cv.getContext('2d');
const statusEl = document.getElementById('status');
function setStatus(t){ statusEl.textContent = t; }

// ---------- 画像読み込み（PNG/JPGはそのまま、TIF/TIFFはUTIFで端末内デコード） ----------
function setupImage(im){
  dxfGeom = null;          // ラスター読込時はDXFモードを解除
  img = im;
  const maxW = 1100, maxH = 850;
  let s = Math.min(1, maxW/im.naturalWidth, maxH/im.naturalHeight);
  cv.width = Math.round(im.naturalWidth*s);
  cv.height = Math.round(im.naturalHeight*s);
  cv.hidden = false;
  document.getElementById('drop').style.display = 'none';
  resetTrace();
  redraw();
  setStatus('読み込み完了。①スケール → 既知寸法の両端を2点クリックしてください。');
}

function isTiff(f){
  return /image\/tiff/i.test(f.type||'') || /\.tiff?$/i.test(f.name||'');
}
function isDxf(f){
  return /\.dxf$/i.test(f.name||'') || /dxf/i.test(f.type||'');
}

// TIF/TIFF をこの端末内だけでPNG相当に変換（UTIF使用・サーバへ送信しない）
async function loadTiff(f){
  if(typeof UTIF === 'undefined'){
    setStatus('TIFデコーダ(UTIF)を読み込めませんでした。ネットワークを確認するか、PNG/JPGでお試しください。');
    return;
  }
  try{
    setStatus('TIFを変換中…（この端末内だけで処理。サーバには送信しません）');
    const buf = await f.arrayBuffer();
    const ifds = UTIF.decode(buf);
    if(!ifds || !ifds.length) throw new Error('TIFのページが見つかりません');
    UTIF.decodeImage(buf, ifds[0], ifds);             // 1ページ目をデコード
    const w = ifds[0].width|0, h = ifds[0].height|0;
    const rgba = UTIF.toRGBA8(ifds[0]);               // RGBA画素列に変換
    if(!w || !h || !rgba || !rgba.length) throw new Error('画素を取得できませんでした');
    const tmp = document.createElement('canvas'); tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext('2d');
    const id = tctx.createImageData(w, h); id.data.set(rgba); tctx.putImageData(id, 0, 0);
    const im = new Image();
    im.onload = () => {
      setupImage(im);
      if(ifds.length > 1) setStatus('読み込み完了（複数ページTIFの1ページ目を表示）。①スケールへ。');
    };
    im.onerror = () => setStatus('変換後画像の表示に失敗しました。');
    im.src = tmp.toDataURL('image/png');              // ＝ ブラウザ内 TIF→PNG 変換
  }catch(e){
    setStatus('このTIFは変換できませんでした（CCITT G4等の圧縮は未対応の場合あり）。PNG/JPGに変換してお試しください。 詳細: '+((e&&e.message)||e));
  }
}

function loadFile(f){
  if(isDxf(f)){ loadDxf(f); return; }
  if(isTiff(f)){ loadTiff(f); return; }
  const url = URL.createObjectURL(f);
  const im = new Image();
  im.onload = () => { setupImage(im); URL.revokeObjectURL(url); };
  im.onerror = () => setStatus('この画像形式はブラウザで表示できません（PNG/JPGでお試しください）。');
  im.src = url;
}
document.getElementById('file').onchange = e => { if(e.target.files[0]) loadFile(e.target.files[0]); };
const drop = document.getElementById('leftPane');
['dragover','drop'].forEach(ev => drop.addEventListener(ev, e => e.preventDefault()));
drop.addEventListener('drop', e => { if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

// ---------- DXF読み込み（端末内でパース→外形/穴を抽出→そのまま3D。スケール校正は不要） ----------
async function loadDxf(f){
  try{
    setStatus('DXFを解析中…（この端末内だけで処理。サーバには送信しません）');
    const text = await f.text();
    const g = parseDxf(text);
    dxfGeom = g;
    img = null;                       // ラスター無し（手動トレースは使わない）
    resetTrace();
    drawDxfPreview(g);
    generateFromDxf();                // 3Dまで自動生成
    const u = g.units === 'unknown' ? 'mm(仮定)' : g.units;
    let msg = `DXF読込OK（単位 ${u}・外形1＋穴${g.holes.length}）。板厚を変えたら「3D生成 ▶」で再生成。`;
    if(g.warnings.length) msg += ' ／ 注意: ' + g.warnings.join('、');
    setStatus(msg);
  }catch(e){
    dxfGeom = null;
    setStatus('DXFを解析できませんでした: ' + ((e && e.message) || e));
  }
}

// 抽出した外形・穴を2Dキャンバスにフィット表示（確認用）
function drawDxfPreview(g){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  const scan = pts => { for(const [x,y] of pts){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } };
  scan(g.outline); g.holes.forEach(scan);
  const w = (maxX-minX)||1, h = (maxY-minY)||1, margin = 24;
  const s = Math.min((1100-2*margin)/w, (850-2*margin)/h);
  cv.width  = Math.round(w*s + 2*margin);
  cv.height = Math.round(h*s + 2*margin);
  cv.hidden = false;
  document.getElementById('drop').style.display = 'none';
  const tx = x => margin + (x-minX)*s;
  const ty = y => cv.height - margin - (y-minY)*s;   // mmのy上向き→canvasのy下向き
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#10b3c8'; ctx.fillStyle='rgba(16,179,200,0.08)'; ctx.lineWidth=2;
  ctx.beginPath();
  g.outline.forEach((p,i)=> i?ctx.lineTo(tx(p[0]),ty(p[1])):ctx.moveTo(tx(p[0]),ty(p[1])));
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#e0413a';
  for(const hole of g.holes){
    ctx.beginPath();
    hole.forEach((p,i)=> i?ctx.lineTo(tx(p[0]),ty(p[1])):ctx.moveTo(tx(p[0]),ty(p[1])));
    ctx.closePath(); ctx.stroke();
  }
  dxfView = { minX, minY, s, margin, H: cv.height };   // クリック→mm 逆変換用に保存
  drawBends();
}

// ---------- モード切替 ----------
function setMode(m){
  if(dxfGeom && (m==='scale'||m==='outline'||m==='holes')){
    setStatus('DXFでは①②③は不要（外形・穴は自動抽出済み）。使えるのは ④曲げ です。'); return;
  }
  mode = m;
  for(const id of ['mScale','mOutline','mHoles','mBend']) document.getElementById(id).classList.remove('on');
  if(m==='scale'){ document.getElementById('mScale').classList.add('on'); scalePts=[]; setStatus('①スケール: 既知寸法の両端を2点クリック。'); }
  if(m==='outline'){ document.getElementById('mOutline').classList.add('on'); setStatus('②輪郭: 板の角を順にクリック。角を全部クリックしたら「3D生成」へ。'); }
  if(m==='holes'){
    document.getElementById('mHoles').classList.add('on');
    const d = prompt('穴の直径 mm（複数の穴に共通。例外は後で）', holeDia);
    if(d) holeDia = parseFloat(d);
    setStatus(`③穴: 穴の中心をクリック（直径${holeDia}mm）。別径は一旦この値で置き、後で変更可。`);
  }
  if(m==='bend'){
    document.getElementById('mBend').classList.add('on'); bendPending = null;
    setStatus('④曲げ: 曲げ線の両端を2点クリック → 角度と向き(山/谷)を入力。平行な複数曲げ(L/コの字/Z/ハット)に対応。');
  }
  redrawCurrent();
}
document.getElementById('mScale').onclick   = () => setMode('scale');
document.getElementById('mOutline').onclick = () => setMode('outline');
document.getElementById('mHoles').onclick   = () => setMode('holes');
document.getElementById('mBend').onclick    = () => setMode('bend');

// ---------- クリック ----------
function canvasXY(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height) };
}
cv.addEventListener('click', e => {
  if(!img && !dxfGeom) return;
  const p = canvasXY(e);
  if(mode==='bend'){                       // 曲げ線（画像・DXF 両対応）
    if(!bendPending){ bendPending = p; setStatus('曲げ線の2点目をクリック。'); }
    else {
      const ang = parseFloat(prompt('曲げ角度（度）。例 90', '90'));
      const ds = (prompt('向き: 山=u / 谷=d（既定 u）', 'u') || 'u').trim().toLowerCase();
      const dir = ds.startsWith('d') ? -1 : 1;
      if(ang > 0) bends.push({ p1:bendPending, p2:p, angle:ang, dir });
      bendPending = null;
      setStatus(`曲げ線を追加（計${bends.length}本）。続けて追加 or 「3D生成 ▶」で折り曲げ。`);
    }
    redrawCurrent();
    return;
  }
  if(!img) return;                         // 以降（スケール/輪郭/穴）は画像トレース専用
  if(mode==='scale'){
    scalePts.push(p);
    if(scalePts.length===2){
      const dpx = Math.hypot(scalePts[1].x-scalePts[0].x, scalePts[1].y-scalePts[0].y);
      const mm = parseFloat(prompt('この2点間の実寸 mm を入力（例 220）', ''));
      if(mm>0){ pxPerMm = dpx/mm; setStatus(`スケール設定OK（${pxPerMm.toFixed(3)} px/mm）。次は②輪郭へ。`); }
      else { scalePts=[]; setStatus('数値が不正です。①スケールをやり直してください。'); }
      mode=null; document.getElementById('mScale').classList.remove('on');
    }
  } else if(mode==='outline'){
    outline.push(p);
  } else if(mode==='holes'){
    holes.push({x:p.x, y:p.y, d:holeDia});
  }
  redraw();
});

// ---------- 戻る/クリア ----------
document.getElementById('undo').onclick = () => {
  if(mode==='bend'){ if(bendPending) bendPending = null; else bends.pop(); }
  else if(mode==='outline') outline.pop();
  else if(mode==='holes') holes.pop();
  else if(mode==='scale') scalePts.pop();
  redrawCurrent();
};
function resetTrace(){ scalePts=[]; pxPerMm=null; outline=[]; holes=[]; bends=[]; bendPending=null; mode=null;
  for(const id of ['mScale','mOutline','mHoles','mBend']) document.getElementById(id).classList.remove('on'); }
document.getElementById('clear').onclick = () => {
  if(dxfGeom){
    dxfGeom = null; bends = []; bendPending = null;
    clearModel();
    ctx.clearRect(0,0,cv.width,cv.height);
    cv.hidden = true; document.getElementById('drop').style.display = '';
    setStatus('クリアしました。図面（画像 or DXF）を読み込んでください。');
    return;
  }
  resetTrace(); redraw(); setStatus('クリアしました。①スケールから。');
};

// ---------- 2D描画 ----------
function redraw(){
  if(!img) return;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(img,0,0,cv.width,cv.height);
  // スケール線
  if(scalePts.length){ ctx.strokeStyle='#e8b800'; ctx.lineWidth=2; ctx.beginPath();
    scalePts.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
    scalePts.forEach(p=>dot(p,'#e8b800')); }
  // 輪郭
  if(outline.length){ ctx.strokeStyle='#10b3c8'; ctx.lineWidth=2; ctx.beginPath();
    outline.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    if(outline.length>2) ctx.closePath(); ctx.stroke();
    outline.forEach(p=>dot(p,'#10b3c8')); }
  // 穴
  ctx.strokeStyle='#e0413a'; ctx.lineWidth=2;
  holes.forEach(h=>{ const r = pxPerMm? h.d/2*pxPerMm : 5;
    ctx.beginPath(); ctx.arc(h.x,h.y,r,0,Math.PI*2); ctx.stroke(); dot(h,'#e0413a'); });
  drawBends();
}
function dot(p,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill(); }

// 曲げ線オーバーレイ（canvas座標。画像・DXF どちらの上にも描く）
function drawBends(){
  if(!bends.length && !bendPending) return;
  ctx.save(); ctx.setLineDash([8,5]); ctx.lineWidth=2; ctx.strokeStyle='#8a4bf0';
  for(const b of bends){ ctx.beginPath(); ctx.moveTo(b.p1.x,b.p1.y); ctx.lineTo(b.p2.x,b.p2.y); ctx.stroke(); }
  ctx.restore();
  for(const b of bends){ dot(b.p1,'#8a4bf0'); dot(b.p2,'#8a4bf0'); }
  if(bendPending) dot(bendPending,'#8a4bf0');
}
// 現在モードに応じて2Dを再描画
function redrawCurrent(){ if(img) redraw(); else if(dxfGeom) drawDxfPreview(dxfGeom); }

// ---------- three.js ----------
const tcv = document.getElementById('three');
const renderer = new THREE.WebGLRenderer({canvas:tcv, antialias:true});
const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef1f4);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100000);
const controls = new OrbitControls(camera, tcv); controls.enableDamping = true;
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.8); dir.position.set(1,1,2); scene.add(dir);
const grid = new THREE.GridHelper(1000, 20, 0xbcc4cf, 0xd6dce3); grid.rotation.x = Math.PI/2; scene.add(grid);
function resize(){ const w=tcv.clientWidth, h=tcv.clientHeight; renderer.setSize(w,h,false);
  camera.aspect = w/Math.max(1,h); camera.updateProjectionMatrix(); }
window.addEventListener('resize', resize); resize();
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();

function fitCamera(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const sph = box.getBoundingSphere(new THREE.Sphere());
  const d = sph.radius / Math.sin(THREE.MathUtils.degToRad(camera.fov/2));
  camera.position.copy(sph.center).add(new THREE.Vector3(0.6,-0.8,1).normalize().multiplyScalar(d*1.4));
  controls.target.copy(sph.center); camera.near = d/100; camera.far = d*100; camera.updateProjectionMatrix();
}

// ---------- 生成 ----------
function toMM(){
  const xs = outline.map(p=>p.x), ys = outline.map(p=>p.y);
  const ox = Math.min(...xs), oy = Math.max(...ys);      // 原点=左下, y上向き
  const out = outline.map(p=>[ (p.x-ox)/pxPerMm, (oy-p.y)/pxPerMm ]);
  const hl  = holes.map(h=>({ x:(h.x-ox)/pxPerMm, y:(oy-h.y)/pxPerMm, d:h.d }));
  const bm  = bends.map(b=>({
    p1:[ (b.p1.x-ox)/pxPerMm, (oy-b.p1.y)/pxPerMm ],
    p2:[ (b.p2.x-ox)/pxPerMm, (oy-b.p2.y)/pxPerMm ],
    angleDeg:b.angle, dir:b.dir }));
  return { out, hl, bm };
}
function dxfCanvasToMM(p){                               // DXFプレビュー上のクリック→mm
  const v = dxfView;
  return [ v.minX + (p.x - v.margin)/v.s, v.minY + (v.H - v.margin - p.y)/v.s ];
}
function holeCircleToPoly(h, segs=48){                   // 折り曲げ時は穴も多角形化
  const pts=[];
  for(let i=0;i<segs;i++){ const a=i/segs*2*Math.PI; pts.push([ h.x + h.d/2*Math.cos(a), h.y + h.d/2*Math.sin(a) ]); }
  return pts;
}
function shiftToOrigin(outl, hls, bnd){                  // 原点寄せ（外形/穴/曲げを同じだけ平行移動）
  let minX=Infinity,minY=Infinity; for(const [x,y] of outl){ if(x<minX)minX=x; if(y<minY)minY=y; }
  const T=([x,y])=>[x-minX,y-minY];
  return { outline:outl.map(T), holes:hls.map(h=>h.map(T)),
           bends:bnd.map(b=>({p1:T(b.p1), p2:T(b.p2), angleDeg:b.angleDeg, dir:b.dir})) };
}

// 既存モデル（Mesh / Group）を破棄
function clearModel(){
  if(!mesh) return;
  scene.remove(mesh);
  if(mesh.geometry) mesh.geometry.dispose();
  if(mesh.traverse) mesh.traverse(o=>{ if(o.geometry) o.geometry.dispose(); });
  mesh = null;
}
const plateMat = () => new THREE.MeshStandardMaterial({color:0x9aa6b2, metalness:0.25, roughness:0.6, side:THREE.DoubleSide});

// Shape を押し出してメッシュ化（平板：手動・DXF 共通）
function buildMesh(shape, thk){
  clearModel();
  const geo = new THREE.ExtrudeGeometry(shape, {depth:thk, bevelEnabled:false});
  mesh = new THREE.Mesh(geo, plateMat()); scene.add(mesh); fitCamera(mesh);
}
// 折り畳み：各パネルを押し出し→行列で配置（Group）
function buildFolded(panels, thk){
  clearModel();
  const group = new THREE.Group();
  for(const pan of panels){
    if(!pan.poly || pan.poly.length<3) continue;
    const shape = new THREE.Shape();
    pan.poly.forEach((p,i)=> i?shape.lineTo(p[0],p[1]):shape.moveTo(p[0],p[1]));
    for(const h of pan.holes){ const path=new THREE.Path(); h.forEach((p,i)=> i?path.lineTo(p[0],p[1]):path.moveTo(p[0],p[1])); shape.holes.push(path); }
    const geo = new THREE.ExtrudeGeometry(shape, {depth:thk, bevelEnabled:false});
    geo.applyMatrix4(new THREE.Matrix4().set(...pan.matrix));   // row-major で受け取り
    group.add(new THREE.Mesh(geo, plateMat()));
  }
  mesh = group; scene.add(group); fitCamera(group);
}

// DXF（mm座標）→ THREE.Shape（原点寄せ）
function shapeFromDxf(g){
  let minX=Infinity, minY=Infinity;
  for(const [x,y] of g.outline){ if(x<minX)minX=x; if(y<minY)minY=y; }
  const shape = new THREE.Shape();
  g.outline.forEach((p,i)=> i?shape.lineTo(p[0]-minX,p[1]-minY):shape.moveTo(p[0]-minX,p[1]-minY));
  for(const h of g.holes){
    const path = new THREE.Path();
    h.forEach((p,i)=> i?path.lineTo(p[0]-minX,p[1]-minY):path.moveTo(p[0]-minX,p[1]-minY));
    shape.holes.push(path);
  }
  return shape;
}
function generateFromDxf(){
  const thk = parseFloat(document.getElementById('thk').value)||2.3;
  buildMesh(shapeFromDxf(dxfGeom), thk);
}

document.getElementById('gen').onclick = () => {
  const thk = parseFloat(document.getElementById('thk').value)||2.3;
  if(dxfGeom){
    if(bends.length){
      const bm = bends.map(b=>({ p1:dxfCanvasToMM(b.p1), p2:dxfCanvasToMM(b.p2), angleDeg:b.angle, dir:b.dir }));
      const sh = shiftToOrigin(dxfGeom.outline, dxfGeom.holes, bm);
      const { panels, warnings } = planFolds({outline:sh.outline, holes:sh.holes}, sh.bends);
      buildFolded(panels, thk);
      setStatus(`DXF＋曲げで3D生成OK（パネル${panels.length}・板厚${thk}mm）${warnings.length?' ／ '+warnings.join('、'):''}`);
    } else {
      generateFromDxf();
      setStatus(`DXFから3D生成OK（外形${dxfGeom.outline.length}点・穴${dxfGeom.holes.length}個・板厚${thk}mm）。右画面をドラッグで回転。`);
    }
    return;
  }
  if(!pxPerMm){ setStatus('先に①スケールを設定してください。'); return; }
  if(outline.length<3){ setStatus('②輪郭を3点以上クリックしてください。'); return; }
  const { out, hl, bm } = toMM();
  if(bends.length){
    const holePolys = hl.map(h=>holeCircleToPoly(h));
    const { panels, warnings } = planFolds({outline:out, holes:holePolys}, bm);
    buildFolded(panels, thk);
    setStatus(`曲げ込みで3D生成OK（パネル${panels.length}・穴${hl.length}・板厚${thk}mm）${warnings.length?' ／ '+warnings.join('、'):''}`);
  } else {
    const shape = new THREE.Shape();
    out.forEach((p,i)=> i?shape.lineTo(p[0],p[1]):shape.moveTo(p[0],p[1]));
    hl.forEach(h=>{ const path=new THREE.Path(); path.absarc(h.x,h.y,h.d/2,0,Math.PI*2,true); shape.holes.push(path); });
    buildMesh(shape, thk);
    setStatus(`3D生成OK（輪郭${out.length}点・穴${hl.length}個・板厚${thk}mm）。右画面をドラッグで回転。`);
  }
};

// ---------- GLB保存 ----------
document.getElementById('export').onclick = () => {
  if(!mesh){ setStatus('先に「3D生成」してください。'); return; }
  new GLTFExporter().parse(mesh, out => {
    const blob = new Blob([out], {type:'model/gltf-binary'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'model.glb'; a.click();
  }, err => setStatus('GLB書き出し失敗: '+err), {binary:true});
};
